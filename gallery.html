<!DOCTYPE html>
<html>

<head>
    <title>Drive API Quickstart</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <link href="./fontawesome/css/fontawesome.css" rel="stylesheet" />
    <link href="./fontawesome/css/solid.css" rel="stylesheet" />
    <link href="./fontawesome/css/brands.css" rel="stylesheet" />
    <link rel="stylesheet" href="web/style.css">

</head>

<body>
    <div class="container-fluid" style="display: flex; flex-direction: column; justify-content: center;">
        <div class="row justify-content-center gallery mb-5" id="gallery">

        </div>
        <button class="btn-primary btn" id="loadMore">Load More</button>
    </div>


    <!-- Modal -->
    <div class="modal fade" id="viewModal" tabindex="-1" role="dialog" aria-labelledby="editModalTitle"
        aria-hidden="true" data-source="">
        <div class="modal-dialog modal-dialog-centered " role="document">
            <div class="modal-content row align-items-center">
                <button type="button" class="closeBtn" data-dismiss="modal"><i class="fa-solid fa-xmark"></i></button>
                <div class="card-wrapper" style="border-radius:0px; background:none;"></div>
            </div>

        </div>
    </div>


    <template id="smallModal">
        <div class="col-sm-4 justify-content-center row">
            <div class="card rounded">
                <img class="card-img-top" src="assets/logo.png" alt="Loading image..." data-toggle="modal"
                    data-target="#viewModal">

                <div class="card-body">
                    <span class="badge badge-custom">Primary</span>
                    <hr>
                    <h5 class="card-title">Card title</h5>
                    <p class="card-text">Some quick example text to build on the card title and make up the bulk of
                        the card's content.</p>

                </div>
            </div>
        </div>
    </template>
    <template id="largeModalCarousel">
        <div id="carouselControls" class="carousel slide" data-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img class="card-img-top" src="assets/logo.png" alt="Loading image...">
                </div>
            </div>
            <a class="carousel-control-prev" href="#carouselControls" role="button" data-slide="prev">
                <i class=" fs-4 fa-solid fa-caret-left text-dark"></i>
                <span class="sr-only">Previous</span>
            </a>
            <a class="carousel-control-next" href="#carouselControls" role="button" data-slide="next">
                <i class="fs-4 fa-solid fa-caret-right text-dark"></i>
                <span class="sr-only">Next</span>
            </a>
        </div>
    </template>
    <template id="carouselImage">
        <div class="carousel-item">
            <img class="card-img-top" src="assets/logo.png" alt="Loading image...">
        </div>
    </template>
        <template id="carouselVideo">
        <div class="carousel-item">
            <video class="card-img-top" src="none" controls muted alt="Loading image...">
        </div>
    </template>


    <script src="web/client.js" type="module"></script>
    <script type="module">
        import * as gly from './web/gallery.js';

        const params = new URLSearchParams(window.location.search);
        var collection = params.getAll('c');
        console.log(collection)
        if (collection.includes("Folk paintings")) {
            collection.pop("Fold paintings")
            collection = collection.concat(["Madubani", "Lippan", "Pichwai", "Warli"])
            var qs = ""
            collection.forEach((e) => {
                qs = `${qs}c=${e}&`
            })
            window.location = window.location.origin + window.location.pathname + "?" + qs
        }

        if (collection.includes("Crafts")) {
            collection.pop("Crafts")
            collection = collection.concat(["Decoupage", "Bottle Art", "Name plates", "Miscellaneous"])
            var qs = ""
            collection.forEach((e) => {
                qs = `${qs}c=${e}&`
            })
            window.location = window.location.origin + window.location.pathname + "?" + qs
        }
        gly.initialisePanel(1, 10, document.getElementById('gallery'), collection)
        document.getElementById("loadMore").addEventListener('click', function () {
            gly.loadProjects(projects, 20, gallery, collection);
        });
    </script>

</body>

</html>
